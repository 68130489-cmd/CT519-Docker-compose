version: '3.8'

services:
  backend-api:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    restart: always

  frontend-web:
    build: ./frontend
    container_name: frontend
    ports:
      - "5000:5000"
    environment:
      - API_URL=http://backend-api:8000/predict
    depends_on:
      - backend-api
    restart: always
